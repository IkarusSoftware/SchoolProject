services:
  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: edusync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: furkan
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: edusync_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U furkan -d edusync_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: edusync-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3 Compatible Storage) ───
  minio:
    image: minio/minio:latest
    container_name: edusync-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: edusync_minio
      MINIO_ROOT_PASSWORD: edusync_minio_2026
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
